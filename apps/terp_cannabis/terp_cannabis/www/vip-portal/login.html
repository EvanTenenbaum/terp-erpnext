<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Client Portal — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f0f0f; color: #fff; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 2.5rem; width: 100%;
            max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    p  { font-size: 0.875rem; color: #888; margin-bottom: 2rem; }
    label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 0.25rem; }
    input { width: 100%; background: #0f0f0f; border: 1px solid #333; border-radius: 6px;
            padding: 0.625rem 0.75rem; color: #fff; font-size: 0.9rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #2563eb; }
    button { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 6px;
             padding: 0.75rem; font-size: 0.95rem; font-weight: 600; cursor: pointer;
             margin-top: 0.5rem; }
    button:hover { background: #1d4ed8; }
    .error { background: #3f1515; border: 1px solid #7f2020; border-radius: 6px;
             padding: 0.75rem; margin-top: 1rem; font-size: 0.85rem; color: #f87171;
             display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>VIP Client Portal</h1>
    <p>Sign in to access your account</p>
    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@example.com" required />
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="••••••••" required />
      <button type="submit">Sign In</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/method/terp_cannabis.api.vip_portal.login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': 'fetch' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (data.message?.status === 'ok') {
          window.location.href = '/vip-portal/dashboard';
        } else {
          errEl.textContent = 'Invalid email or password.';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Login failed. Please try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
